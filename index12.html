<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Little Learners ERP Demo</title>
  <style>
    :root {
      --ink: #0f172a;
      --muted: #64748b;
      --line: #d8e6f5;
      --panel: rgba(255,255,255,.86);
      --blue: #1e88e5;
      --blue-dark: #075985;
      --sky: #eaf7ff;
      --gold: #c9973a;
      --gold-2: #f0d080;
      --green: #12a150;
      --red: #dc2626;
      --shadow: 0 18px 45px rgba(15, 23, 42, .12);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      background:
        radial-gradient(circle at 12% 0%, rgba(83, 177, 255, .32), transparent 34%),
        linear-gradient(135deg, #f8fcff 0%, #e7f7ff 44%, #ffffff 100%);
      min-height: 100vh;
    }
    button, input, select, textarea { font: inherit; }
    button { cursor: pointer; }
    .app { display: grid; grid-template-columns: 292px 1fr; min-height: 100vh; }
    .sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      padding: 22px 18px;
      background: linear-gradient(180deg, #07121f 0%, #0f172a 100%);
      color: #eaf4ff;
      border-right: 1px solid rgba(255,255,255,.1);
      overflow: auto;
    }
    .brand { display: flex; gap: 14px; align-items: center; padding: 6px 8px 22px; }
    .brand-mark {
      width: 58px; height: 58px; border-radius: 16px;
      display: grid; place-items: center; color: #06111f; font-weight: 900; font-size: 22px;
      background: linear-gradient(135deg, var(--gold), var(--gold-2));
      box-shadow: 0 14px 32px rgba(201,151,58,.26);
    }
    .brand h1 { margin: 0; font-size: 19px; line-height: 1.15; color: #fff4c9; }
    .brand p { margin: 5px 0 0; color: #9fb5ce; font-size: 13px; }
    .tenant-card {
      border: 1px solid rgba(240,208,128,.22);
      border-radius: 14px;
      padding: 14px;
      background: rgba(255,255,255,.06);
      margin-bottom: 18px;
    }
    .tenant-card label { display: block; color: #bcd0e7; font-size: 12px; margin-bottom: 8px; }
    .tenant-card select {
      width: 100%; border: 1px solid rgba(255,255,255,.12); border-radius: 10px;
      background: #091827; color: #fff7d9; padding: 11px;
    }
    .nav-group { margin: 18px 0 8px; color: #84a4c8; font-size: 11px; text-transform: uppercase; letter-spacing: .12em; }
    .nav button {
      width: 100%;
      display: flex; align-items: center; gap: 12px;
      padding: 12px 13px; margin: 5px 0;
      color: #dbeafe; background: transparent; border: 1px solid transparent; border-radius: 12px;
      text-align: left;
    }
    .nav button:hover, .nav button.active {
      border-color: rgba(240,208,128,.32);
      background: linear-gradient(90deg, rgba(201,151,58,.18), rgba(30,136,229,.12));
      color: #fff3c0;
    }
    .nav .ico { width: 26px; height: 26px; border-radius: 8px; display: grid; place-items: center; background: rgba(255,255,255,.08); color: #f0d080; font-weight: 800; }
    main { padding: 26px; min-width: 0; }
    .topbar {
      display: flex; align-items: center; justify-content: space-between; gap: 18px; margin-bottom: 22px;
    }
    .search {
      max-width: 540px; width: 100%; display: flex; align-items: center; gap: 10px;
      background: rgba(255,255,255,.86); border: 1px solid var(--line); border-radius: 16px; padding: 12px 14px; box-shadow: 0 12px 24px rgba(14,116,144,.06);
    }
    .search input { border: 0; outline: 0; background: transparent; width: 100%; color: var(--ink); }
    .actions { display: flex; align-items: center; gap: 10px; }
    .pill {
      border: 1px solid var(--line); background: rgba(255,255,255,.85); color: var(--blue-dark);
      border-radius: 999px; padding: 10px 14px; font-weight: 700;
    }
    .primary, .secondary, .danger {
      border: 0; border-radius: 12px; padding: 12px 16px; font-weight: 800;
      display: inline-flex; align-items: center; gap: 9px;
    }
    .primary { background: linear-gradient(135deg, var(--gold), var(--gold-2)); color: #141006; box-shadow: 0 12px 25px rgba(201,151,58,.26); }
    .secondary { background: #eaf6ff; color: var(--blue-dark); border: 1px solid #c8e6fb; }
    .danger { background: #fff1f2; color: #be123c; border: 1px solid #fecdd3; }
    .hero {
      border: 1px solid rgba(126, 194, 238, .45);
      border-radius: 22px;
      padding: 24px;
      background:
        linear-gradient(135deg, rgba(255,255,255,.92), rgba(232,247,255,.78)),
        radial-gradient(circle at 96% 10%, rgba(240,208,128,.28), transparent 26%);
      box-shadow: var(--shadow);
      margin-bottom: 22px;
    }
    .hero h2 { margin: 0 0 8px; font-size: clamp(28px, 4vw, 46px); letter-spacing: 0; }
    .hero p { margin: 0; color: var(--muted); font-size: 16px; max-width: 850px; line-height: 1.55; }
    .stats { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 14px; margin: 18px 0 0; }
    .stat {
      background: rgba(255,255,255,.86); border: 1px solid var(--line); border-radius: 16px; padding: 16px;
    }
    .stat span { color: var(--muted); font-size: 13px; }
    .stat strong { display: block; margin-top: 6px; font-size: 28px; }
    .grid { display: grid; gap: 18px; }
    .grid.two { grid-template-columns: 1.1fr .9fr; }
    .grid.three { grid-template-columns: repeat(3, minmax(0,1fr)); }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: 0 14px 35px rgba(30,136,229,.08);
      padding: 18px;
      backdrop-filter: blur(14px);
    }
    .card h3 { margin: 0 0 14px; font-size: 20px; }
    .tabs { display: flex; flex-wrap: wrap; gap: 9px; margin: 0 0 16px; }
    .tab {
      border: 1px solid #c9dff1; background: #f7fcff; color: #28506f;
      padding: 10px 13px; border-radius: 999px; font-weight: 800;
    }
    .tab.active { background: linear-gradient(135deg, #0f172a, #164e63); color: #fff2c2; border-color: rgba(240,208,128,.52); }
    .form-grid { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 14px; }
    .field { display: grid; gap: 7px; }
    .field.full { grid-column: 1 / -1; }
    label { font-size: 13px; color: #31536c; font-weight: 800; }
    input, select, textarea {
      border: 1px solid #bdd8ec; border-radius: 12px; background: #fff; color: var(--ink);
      padding: 12px 13px; outline: 0;
    }
    textarea { min-height: 92px; resize: vertical; }
    input:focus, select:focus, textarea:focus { border-color: var(--blue); box-shadow: 0 0 0 4px rgba(30,136,229,.12); }
    .table-wrap { overflow: auto; border: 1px solid var(--line); border-radius: 15px; }
    table { width: 100%; border-collapse: collapse; min-width: 760px; background: #fff; }
    th, td { padding: 13px 14px; border-bottom: 1px solid #e6eef7; text-align: left; font-size: 14px; }
    th { color: #31536c; background: #f0f8ff; font-size: 12px; text-transform: uppercase; letter-spacing: .08em; }
    tr:last-child td { border-bottom: 0; }
    .badge { display: inline-flex; align-items: center; border-radius: 999px; padding: 5px 10px; font-weight: 800; font-size: 12px; }
    .paid, .present, .active-badge { background: #dcfce7; color: #166534; }
    .due, .pending { background: #fff7ed; color: #9a3412; }
    .absent, .critical { background: #fee2e2; color: #991b1b; }
    .chart { display: grid; gap: 11px; }
    .bar-row { display: grid; grid-template-columns: 110px 1fr 42px; gap: 10px; align-items: center; color: #34566f; font-size: 13px; }
    .bar { height: 12px; border-radius: 999px; background: #dbeefa; overflow: hidden; }
    .bar i { display: block; height: 100%; border-radius: 999px; background: linear-gradient(90deg, var(--blue), #6dd5fa); }
    .toast {
      position: fixed; right: 22px; bottom: 22px; z-index: 10;
      transform: translateY(130%); transition: .25s ease;
      background: #07121f; color: #fff7d9; border: 1px solid rgba(240,208,128,.35);
      border-radius: 14px; padding: 14px 16px; box-shadow: var(--shadow);
    }
    .toast.show { transform: translateY(0); }
    .modal-backdrop {
      position: fixed; inset: 0; background: rgba(15,23,42,.48); display: none; place-items: center; padding: 20px; z-index: 20;
    }
    .modal-backdrop.show { display: grid; }
    .modal { max-width: 860px; width: 100%; background: #fff; border-radius: 20px; padding: 20px; box-shadow: var(--shadow); }
    .modal-head { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 16px; }
    .close { border: 0; background: #eef6fc; border-radius: 10px; width: 40px; height: 40px; color: #075985; font-size: 18px; }
    .mobile-shell {
      width: 100%; max-width: 335px; min-height: 610px; margin: auto; border-radius: 34px; padding: 15px;
      background: #0f172a; box-shadow: inset 0 0 0 2px rgba(255,255,255,.08), var(--shadow);
    }
    .mobile-screen { min-height: 580px; background: #f7fcff; border-radius: 25px; overflow: hidden; }
    .mobile-top { background: linear-gradient(135deg,#0f172a,#0e7490); color: white; padding: 22px 18px; }
    .mobile-card { margin: 12px; padding: 13px; border-radius: 15px; border: 1px solid #d8e6f5; background: white; }
    .hidden { display: none !important; }
    @media (max-width: 1280px) {
      .grid.two { grid-template-columns: 1fr; }
    }
    @media (max-width: 980px) {
      .app { grid-template-columns: 1fr; }
      .sidebar { position: static; height: auto; }
      main { padding: 16px; }
      .grid.three, .stats { grid-template-columns: 1fr; }
      .topbar { flex-direction: column; align-items: stretch; }
      .actions { flex-wrap: wrap; }
    }
    @media (max-width: 560px) {
      .form-grid { grid-template-columns: 1fr; }
      .brand h1 { font-size: 17px; }
    }
  </style>
</head>
<body>
  <div class="app" id="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark" id="brandInitials">LL</div>
        <div>
          <h1 id="brandName">Little Learners Preschool</h1>
          <p id="brandGroup">Multi-Branch SaaS ERP</p>
        </div>
      </div>
      <div class="tenant-card">
        <label for="tenantSelect">Active school tenant</label>
        <select id="tenantSelect"></select>
      </div>
      <div class="nav" id="nav"></div>
    </aside>
    <main>
      <div class="topbar">
        <div class="search">
          <strong>Search</strong>
          <input id="globalSearch" placeholder="Find student, invoice, parent, staff, route...">
        </div>
        <div class="actions">
          <button class="pill" id="rolePill">Admin</button>
          <button class="secondary" id="exportBtn">Export Report</button>
          <button class="primary" id="quickAddBtn">Add Record</button>
        </div>
      </div>
      <section id="view"></section>
    </main>
  </div>
  <div class="toast" id="toast"></div>
  <div class="modal-backdrop" id="modal">
    <div class="modal">
      <div class="modal-head">
        <div>
          <h3 id="modalTitle" style="margin:0">Add Record</h3>
          <p id="modalSub" style="margin:5px 0 0;color:#64748b">Enter information and save.</p>
        </div>
        <button class="close" id="closeModal">x</button>
      </div>
      <form id="recordForm" class="form-grid"></form>
    </div>
  </div>
  <script>
    const modules = [
      ["dashboard", "Dashboard", "D"],
      ["school", "School Setup", "S"],
      ["admissions", "Student Admission", "A"],
      ["students", "Students", "ST"],
      ["parents", "Parent Portal", "P"],
      ["attendance", "Attendance", "AT"],
      ["activities", "Activities", "AC"],
      ["care", "Daily Care", "C"],
      ["meals", "Meal Tracking", "M"],
      ["health", "Health", "H"],
      ["development", "Development", "DV"],
      ["academics", "Academics", "ED"],
      ["staff", "Staff", "HR"],
      ["fees", "Fees", "F"],
      ["accounting", "Accounting", "IN"],
      ["transport", "Transport", "TR"],
      ["communication", "Communication", "CM"],
      ["events", "Events", "EV"],
      ["gallery", "Media Gallery", "MG"],
      ["reports", "Reports", "R"],
      ["website", "Website Widgets", "W"],
      ["mobile", "Mobile Apps", "MB"],
      ["security", "RBAC & Audit", "RB"]
    ];

    const moduleMeta = {
      school: { title: "School Setup", desc: "Configure profile, branches, academic years, terms, classes, sections, sessions, holidays, and branding.", fields: [
        ["School Name", "text"], ["Branch", "text"], ["Academic Year", "text"], ["Program", "select", "Infant,Toddler,Nursery,Junior KG,Senior KG"], ["Working Days", "text"], ["Principal", "text"], ["Address", "textarea"]
      ]},
      admissions: { title: "Student Admission", desc: "Capture online admission forms, parent details, medical information, documents, and approval workflow.", fields: [
        ["Child Name", "text"], ["Date of Birth", "date"], ["Program", "select", "Infant,Toddler,Nursery,Junior KG,Senior KG"], ["Parent Name", "text"], ["Parent Phone", "tel"], ["Document Type", "select", "Photo,Birth Certificate,Aadhar Card"], ["Upload JPG/PDF under 20MB", "file"], ["Medical Notes", "textarea"]
      ]},
      students: { title: "Student Management", desc: "Student profiles with attendance, fees, activity participation, documents, promotion, transfer, and withdrawal actions.", fields: [
        ["Student Name", "text"], ["Class", "select", "Infant,Toddler,Nursery,Junior KG,Senior KG"], ["Section", "text"], ["Status", "select", "Active,Promoted,Transferred,Withdrawn"], ["Parent", "text"], ["Notes", "textarea"]
      ]},
      parents: { title: "Parent Portal", desc: "Parent dashboard for attendance, daily reports, fees, progress, notifications, events, permissions, and messages.", fields: [
        ["Parent Name", "text"], ["Linked Student", "text"], ["Email", "email"], ["Phone", "tel"], ["Portal Status", "select", "Active,Invite Sent,Blocked"], ["Message", "textarea"]
      ]},
      attendance: { title: "Attendance Management", desc: "Student, daycare, and staff attendance with check-in, check-out, pickup verification, and alerts.", fields: [
        ["Person Name", "text"], ["Type", "select", "Student,Teacher,Caregiver,Office Staff"], ["Check In", "time"], ["Check Out", "time"], ["Pickup Person", "text"], ["Status", "select", "Present,Absent,Late,Half Day"]
      ]},
      activities: { title: "Activity Management", desc: "Daily, weekly, and monthly planners for preschool activities with teacher notes and parent sharing.", fields: [
        ["Activity", "select", "Art & Craft,Coloring,Storytelling,Music,Dance,Outdoor Play,Indoor Games,Reading,Sensory"], ["Class", "text"], ["Teacher", "text"], ["Date", "date"], ["Parent Sharing", "select", "Shared,Draft,Internal"], ["Notes", "textarea"]
      ]},
      care: { title: "Daily Child Care Reports", desc: "Track mood, meals, water, naps, diapers, toilet visits, medicines, activities, and parent reports.", fields: [
        ["Child Name", "text"], ["Mood", "select", "Happy,Calm,Tired,Upset"], ["Meal", "select", "Good,Partial,Refused"], ["Nap Time", "text"], ["Diaper/Toilet", "text"], ["Medication Given", "select", "No,Yes"], ["Care Notes", "textarea"]
      ]},
      meals: { title: "Meal Tracking", desc: "Track breakfast, lunch, snacks, consumed percentage, refusals, allergies, and special diets.", fields: [
        ["Child Name", "text"], ["Meal Type", "select", "Breakfast,Lunch,Evening Snack"], ["Consumed %", "number"], ["Reaction", "select", "None,Refused,Allergic Reaction"], ["Special Diet", "text"], ["Notes", "textarea"]
      ]},
      health: { title: "Health Management", desc: "Temperature, symptoms, medication, illness records, incident reports, and instant parent alerts.", fields: [
        ["Child Name", "text"], ["Temperature", "number"], ["Symptoms", "text"], ["Medication", "text"], ["Parent Alert", "select", "Sent,Not Sent,Not Required"], ["Health Notes", "textarea"]
      ]},
      development: { title: "Child Development Tracking", desc: "Milestones across cognitive, communication, social, motor, and emotional development areas.", fields: [
        ["Child Name", "text"], ["Area", "select", "Cognitive,Communication,Social,Motor,Emotional"], ["Milestone", "text"], ["Progress", "select", "Emerging,Developing,Achieved"], ["Observation Date", "date"], ["Teacher Observation", "textarea"]
      ]},
      academics: { title: "Academic Management", desc: "Subjects, curriculum, lesson plans, objectives, assessment, skill evaluation, and report cards.", fields: [
        ["Subject", "text"], ["Class", "text"], ["Teacher", "text"], ["Learning Objective", "text"], ["Assessment", "select", "Observation,Worksheet,Activity,Oral"], ["Lesson Notes", "textarea"]
      ]},
      staff: { title: "Staff Management", desc: "Employee profiles, attendance, leave, payroll, documents, and performance reviews.", fields: [
        ["Staff Name", "text"], ["Role", "select", "Teacher,Caregiver,Receptionist,Accountant,Principal"], ["Phone", "tel"], ["Joining Date", "date"], ["Payroll Status", "select", "Active,On Hold,Processed"], ["Notes", "textarea"]
      ]},
      fees: { title: "Fee Management", desc: "Fee structures, daycare plans, invoices, recurring invoices, payment collection, and receipts.", fields: [
        ["Student Name", "text"], ["Fee Type", "select", "Monthly Fee,Daycare Plan,Transport,Activity"], ["Amount", "number"], ["Due Date", "date"], ["Payment Method", "select", "Cash,UPI,Card,Net Banking,Razorpay,Stripe,PayPal"], ["Status", "select", "Paid,Due,Partial"]
      ]},
      accounting: { title: "Accounting", desc: "Income, expenses, receipts, outstanding fees, revenue dashboard, profit/loss summary, and GST-ready reports.", fields: [
        ["Entry Type", "select", "Income,Expense,Receipt"], ["Category", "text"], ["Amount", "number"], ["Date", "date"], ["GST", "select", "Applicable,Not Applicable"], ["Notes", "textarea"]
      ]},
      transport: { title: "Transport Management", desc: "Vehicles, drivers, routes, stops, pickup/drop tracking, GPS status, and parent notifications.", fields: [
        ["Route", "text"], ["Vehicle", "text"], ["Driver", "text"], ["Stop", "text"], ["GPS Status", "select", "Online,Delayed,Offline"], ["Parent Notification", "select", "Sent,Pending"]
      ]},
      communication: { title: "Communication Center", desc: "SMS, email, WhatsApp, push notifications, broadcasts, templates, schedules, and read receipts.", fields: [
        ["Channel", "select", "SMS,Email,WhatsApp,Push"], ["Audience", "select", "All Parents,Class,Staff,Branch"], ["Subject", "text"], ["Schedule", "datetime-local"], ["Read Receipt", "select", "Required,Optional"], ["Message", "textarea"]
      ]},
      events: { title: "Events Management", desc: "Sports day, annual day, parent meetings, celebrations, workshops, RSVP, attendance, galleries, and feedback.", fields: [
        ["Event Name", "text"], ["Date", "date"], ["Audience", "text"], ["RSVP", "select", "Open,Closed,Not Required"], ["Venue", "text"], ["Notes", "textarea"]
      ]},
      gallery: { title: "Media Gallery", desc: "Photos, videos, activity albums, event albums, parent permissions, download controls, and privacy controls.", fields: [
        ["Album Name", "text"], ["Album Type", "select", "Activity,Event,Class,Private"], ["Class", "text"], ["Permission", "select", "Parents Can View,Parents Can Download,Restricted"], ["File", "file"], ["Caption", "textarea"]
      ]},
      reports: { title: "Reports & Analytics", desc: "Student, staff, finance, attendance, enrollment, activity, daily care, and revenue reports.", fields: [
        ["Report Type", "select", "Attendance,Progress,Activities,Daily Care,Payroll,Revenue,Outstanding Fees"], ["Branch", "text"], ["From Date", "date"], ["To Date", "date"], ["Format", "select", "PDF,Excel,Dashboard"], ["Notes", "textarea"]
      ]},
      website: { title: "Website & Widgets", desc: "Public pages, parent login widget, fee payment widget, inquiry form, noticeboard, and program pages.", fields: [
        ["Page/Widget", "select", "Home,About,Admissions,Contact,Programs,Parent Login,Fee Payment,Inquiry,Noticeboard"], ["Title", "text"], ["Visibility", "select", "Published,Draft,Private"], ["Owner", "text"], ["Content", "textarea"]
      ]},
      mobile: { title: "Mobile Apps", desc: "Parent and teacher mobile app flows for daily updates, attendance, fees, notifications, messages, and lesson plans.", fields: [
        ["App Role", "select", "Parent,Teacher"], ["Feature", "select", "Daily Updates,Attendance,Fees,Notifications,Messages,Gallery,Lesson Plans"], ["User", "text"], ["Status", "select", "Enabled,Disabled,Beta"], ["Release Notes", "textarea"]
      ]},
      security: { title: "RBAC & Audit", desc: "Tenant isolation, roles, dynamic permissions, MFA-ready sessions, device management, and audit logs.", fields: [
        ["Role", "select", "Super Admin,School Admin,Principal,Teacher,Caregiver,Accountant,Receptionist,Parent"], ["Permission", "text"], ["Scope", "select", "Tenant,Branch,Class,Student,Own"], ["MFA", "select", "Ready,Required,Not Required"], ["Audit Note", "textarea"]
      ]}
    };

    const tenants = [
      { id: "little", name: "Little Learners Preschool", group: "Little Learners Group", address: "Baner, Pune", phone: "+91 98765 43210", logo: "LL" },
      { id: "sunrise", name: "Sunrise Kids Academy", group: "Sunrise Education Trust", address: "Whitefield, Bengaluru", phone: "+91 99887 77665", logo: "SK" },
      { id: "oak", name: "Oak Valley Daycare", group: "Oak Valley Schools", address: "Andheri, Mumbai", phone: "+91 91234 56780", logo: "OV" }
    ];

    const seed = {
      students: [
        { "Student Name": "Aarav Sharma", "Class": "Nursery", "Section": "A", "Status": "Active", "Parent": "Riya Sharma", "Notes": "Allergies: peanuts" },
        { "Student Name": "Myra Mehta", "Class": "Junior KG", "Section": "B", "Status": "Active", "Parent": "Karan Mehta", "Notes": "Transport route R-2" }
      ],
      fees: [
        { "Student Name": "Aarav Sharma", "Fee Type": "Monthly Fee", "Amount": "12500", "Due Date": "2026-07-05", "Payment Method": "UPI", "Status": "Paid" },
        { "Student Name": "Myra Mehta", "Fee Type": "Daycare Plan", "Amount": "18000", "Due Date": "2026-07-05", "Payment Method": "Razorpay", "Status": "Due" }
      ],
      attendance: [
        { "Person Name": "Aarav Sharma", "Type": "Student", "Check In": "09:08", "Check Out": "15:10", "Pickup Person": "Riya Sharma", "Status": "Present" },
        { "Person Name": "Neha Verma", "Type": "Teacher", "Check In": "08:35", "Check Out": "16:40", "Pickup Person": "-", "Status": "Present" }
      ],
      care: [
        { "Child Name": "Aarav Sharma", "Mood": "Happy", "Meal": "Good", "Nap Time": "1h 20m", "Diaper/Toilet": "2 toilet visits", "Medication Given": "No", "Care Notes": "Shared story activity with parents." }
      ],
      communication: [
        { "Channel": "WhatsApp", "Audience": "All Parents", "Subject": "Monsoon circular", "Schedule": "2026-07-01T09:00", "Read Receipt": "Required", "Message": "Raincoat and extra clothes required." }
      ]
    };

    const state = {
      tenant: localStorage.getItem("erpTenant") || "little",
      view: localStorage.getItem("erpView") || "dashboard",
      search: ""
    };

    function storeKey(module) { return `erpDemo:${state.tenant}:${module}`; }
    function getRecords(module) {
      const raw = localStorage.getItem(storeKey(module));
      if (raw) return JSON.parse(raw);
      return seed[module] ? JSON.parse(JSON.stringify(seed[module])) : [];
    }
    function setRecords(module, rows) { localStorage.setItem(storeKey(module), JSON.stringify(rows)); }
    function toast(msg) {
      const el = document.getElementById("toast");
      el.textContent = msg;
      el.classList.add("show");
      clearTimeout(window.toastTimer);
      window.toastTimer = setTimeout(() => el.classList.remove("show"), 2600);
    }

    function renderShell() {
      const tenant = tenants.find(t => t.id === state.tenant);
      document.getElementById("brandName").textContent = tenant.name;
      document.getElementById("brandGroup").textContent = `${tenant.group} • ${tenant.address}`;
      document.getElementById("brandInitials").textContent = tenant.logo;
      document.getElementById("tenantSelect").innerHTML = tenants.map(t => `<option value="${t.id}" ${t.id === state.tenant ? "selected" : ""}>${t.name}</option>`).join("");
      const groups = [
        ["Core", modules.slice(0, 8)],
        ["Operations", modules.slice(8, 17)],
        ["Experience", modules.slice(17)]
      ];
      document.getElementById("nav").innerHTML = groups.map(([name, items]) => `
        <div class="nav-group">${name}</div>
        ${items.map(([id, label, ico]) => `<button class="${state.view === id ? "active" : ""}" data-view="${id}"><span class="ico">${ico}</span>${label}</button>`).join("")}
      `).join("");
    }

    function dashboard() {
      const students = getRecords("students");
      const fees = getRecords("fees");
      const attendance = getRecords("attendance");
      const due = fees.filter(f => String(f.Status).toLowerCase().includes("due")).length;
      return `
        <div class="hero">
          <h2>Preschool + Daycare Management System</h2>
          <p>Enterprise SaaS dashboard for multi-branch school operations, parent communication, daycare tracking, fee collection, staff workflows, and compliance-ready records.</p>
          <div class="stats">
            <div class="stat"><span>Active Students</span><strong>${students.length + 238}</strong></div>
            <div class="stat"><span>Today Attendance</span><strong>94%</strong></div>
            <div class="stat"><span>Fee Due Cases</span><strong>${due}</strong></div>
            <div class="stat"><span>Parent Messages</span><strong>128</strong></div>
          </div>
        </div>
        <div class="grid two">
          <div class="card">
            <h3>Live Operations</h3>
            <div class="chart">
              ${bar("Infant Program", 74)}${bar("Toddler Program", 82)}${bar("Nursery", 91)}${bar("Junior KG", 88)}${bar("Senior KG", 79)}
            </div>
          </div>
          <div class="card">
            <h3>Customer-Ready Mobile Preview</h3>
            <div class="mobile-shell">
              <div class="mobile-screen">
                <div class="mobile-top">
                  <strong>Parent App</strong>
                  <p style="margin:6px 0 0;color:#cfefff">Aarav Sharma • Nursery A</p>
                </div>
                <div class="mobile-card"><strong>Today</strong><p style="margin:6px 0;color:#64748b">Checked in 09:08 • Mood happy • Lunch 85%</p></div>
                <div class="mobile-card"><strong>Daily Care Report</strong><p style="margin:6px 0;color:#64748b">Nap 1h 20m, water intake good, no medication.</p></div>
                <div class="mobile-card"><strong>Fees</strong><p style="margin:6px 0;color:#64748b">July invoice paid via UPI.</p></div>
              </div>
            </div>
          </div>
        </div>`;
    }

    function bar(label, value) {
      return `<div class="bar-row"><span>${label}</span><div class="bar"><i style="width:${value}%"></i></div><strong>${value}%</strong></div>`;
    }

    function moduleView(id) {
      const meta = moduleMeta[id];
      const rows = getRecords(id);
      const visibleRows = rows.filter(row => JSON.stringify(row).toLowerCase().includes(state.search.toLowerCase()));
      return `
        <div class="hero">
          <h2>${meta.title}</h2>
          <p>${meta.desc}</p>
          <div class="stats">
            <div class="stat"><span>Saved Records</span><strong>${rows.length}</strong></div>
            <div class="stat"><span>Branch Scope</span><strong>3</strong></div>
            <div class="stat"><span>Workflow Health</span><strong>98%</strong></div>
            <div class="stat"><span>Audit Ready</span><strong>Yes</strong></div>
          </div>
        </div>
        <div class="grid two">
          <div class="card">
            <h3>Enter Required Information</h3>
            <div class="tabs">
              ${moduleTabs(id).map((t, i) => `<button class="tab ${i === 0 ? "active" : ""}" onclick="toast('${t} workspace opened')">${t}</button>`).join("")}
            </div>
            <form class="form-grid" onsubmit="saveInline(event, '${id}')">
              ${fieldsHtml(meta.fields, id)}
              <div class="field full" style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
                <button class="primary" type="submit">Save Record</button>
                <button class="secondary" type="button" onclick="prefill('${id}')">Use Sample Data</button>
                <button class="danger" type="button" onclick="clearModule('${id}')">Clear Records</button>
              </div>
            </form>
          </div>
          <div class="card">
            <h3>Saved Results</h3>
            ${tableHtml(visibleRows)}
          </div>
        </div>`;
    }

    function moduleTabs(id) {
      const map = {
        school: ["Profile", "Branches", "Academic Years", "Classes", "Holidays", "Branding"],
        admissions: ["Online Form", "Parent Details", "Medical Details", "Document Upload", "Approval Workflow"],
        attendance: ["Daily", "QR/RFID", "Check In", "Check Out", "Live Dashboard"],
        fees: ["Fee Structure", "Invoices", "Collection", "Receipts", "Gateways"],
        communication: ["Broadcast", "Templates", "Scheduled", "Read Receipts"],
        security: ["Roles", "Permissions", "Sessions", "Devices", "Audit Logs"]
      };
      return map[id] || ["Workspace", "Approvals", "Reports", "Audit"];
    }

    function fieldsHtml(fields, id) {
      return fields.map(([label, type, options]) => {
        const name = label.replace(/[^a-z0-9]/gi, "_");
        if (type === "select") return `<div class="field"><label>${label}</label><select name="${label}" required><option value="">Select</option>${options.split(",").map(o => `<option>${o}</option>`).join("")}</select></div>`;
        if (type === "textarea") return `<div class="field full"><label>${label}</label><textarea name="${label}" placeholder="Enter ${label.toLowerCase()}"></textarea></div>`;
        if (type === "file") return `<div class="field"><label>${label}</label><input name="${label}" type="file" accept=".jpg,.jpeg,.pdf" data-file-for="${id}"><small style="color:#64748b">Allowed: JPG or PDF, maximum 20 MB.</small></div>`;
        return `<div class="field"><label>${label}</label><input name="${label}" type="${type}" ${type !== "number" ? `placeholder="Enter ${label.toLowerCase()}"` : ""} required></div>`;
      }).join("");
    }

    function tableHtml(rows) {
      if (!rows.length) return `<p style="color:#64748b">No records yet. Fill the form and click Save Record.</p>`;
      const keys = Object.keys(rows[0]).filter(k => !k.startsWith("_")).slice(0, 7);
      return `<div class="table-wrap"><table><thead><tr>${keys.map(k => `<th>${k}</th>`).join("")}</tr></thead><tbody>
        ${rows.map(row => `<tr>${keys.map(k => `<td>${cell(row[k])}</td>`).join("")}</tr>`).join("")}
      </tbody></table></div>`;
    }

    function cell(value) {
      const text = String(value || "-");
      const low = text.toLowerCase();
      const cls = low.includes("paid") || low.includes("present") || low.includes("active") || low.includes("sent") ? "paid" :
        low.includes("due") || low.includes("pending") || low.includes("partial") ? "due" :
        low.includes("absent") || low.includes("blocked") || low.includes("offline") ? "absent" : "";
      return cls ? `<span class="badge ${cls}">${text}</span>` : text;
    }

    window.saveInline = function(event, id) {
      event.preventDefault();
      const form = event.target;
      const data = {};
      for (const el of form.elements) {
        if (!el.name) continue;
        if (el.type === "file") {
          if (el.files.length) {
            const file = el.files[0];
            const validType = /(\.jpg|\.jpeg|\.pdf)$/i.test(file.name);
            if (!validType || file.size > 20 * 1024 * 1024) {
              toast("File must be JPG or PDF under 20 MB.");
              return;
            }
            data[el.name] = file.name;
          }
        } else {
          data[el.name] = el.value;
        }
      }
      const rows = getRecords(id);
      rows.unshift(data);
      setRecords(id, rows);
      form.reset();
      toast(`${moduleMeta[id].title} record saved correctly.`);
      render();
    };

    window.prefill = function(id) {
      const form = document.querySelector("form.form-grid");
      if (!form) return;
      moduleMeta[id].fields.forEach(([label, type, options]) => {
        const el = form.elements[label];
        if (!el || type === "file") return;
        if (type === "select") el.value = options.split(",")[0];
        else if (type === "date") el.value = "2026-07-01";
        else if (type === "time") el.value = "09:00";
        else if (type === "datetime-local") el.value = "2026-07-01T09:00";
        else if (type === "number") el.value = label.includes("Temperature") ? "98.6" : "12500";
        else el.value = sampleValue(label);
      });
      toast("Sample data filled. Review and save.");
    };

    function sampleValue(label) {
      const samples = {
        "Child Name": "Aarav Sharma", "Student Name": "Aarav Sharma", "Parent Name": "Riya Sharma", "Parent Phone": "+91 98765 43210",
        "School Name": "Little Learners Preschool", "Branch": "Pune Main", "Academic Year": "2026-27", "Working Days": "Monday to Friday",
        "Principal": "Anita Rao", "Address": "Baner, Pune", "Person Name": "Aarav Sharma", "Teacher": "Neha Verma", "Activity": "Storytelling",
        "Class": "Nursery A", "Notes": "Verified by school admin."
      };
      return samples[label] || `Sample ${label}`;
    }

    window.clearModule = function(id) {
      setRecords(id, []);
      toast(`${moduleMeta[id].title} records cleared.`);
      render();
    };

    function openModal() {
      const id = state.view === "dashboard" ? "admissions" : state.view;
      if (!moduleMeta[id]) return;
      document.getElementById("modalTitle").textContent = `Add ${moduleMeta[id].title} Record`;
      document.getElementById("modalSub").textContent = "This quick entry writes to the active tenant and module.";
      document.getElementById("recordForm").innerHTML = `${fieldsHtml(moduleMeta[id].fields, id)}<div class="field full"><button class="primary" type="submit">Save Quick Record</button></div>`;
      document.getElementById("recordForm").onsubmit = e => saveInline(e, id);
      document.getElementById("modal").classList.add("show");
    }

    function render() {
      renderShell();
      localStorage.setItem("erpTenant", state.tenant);
      localStorage.setItem("erpView", state.view);
      document.getElementById("view").innerHTML = state.view === "dashboard" ? dashboard() : moduleView(state.view);
      bindDynamic();
    }

    function bindDynamic() {
      document.querySelectorAll("[data-view]").forEach(btn => {
        btn.addEventListener("click", () => { state.view = btn.dataset.view; render(); });
      });
    }

    document.getElementById("tenantSelect").addEventListener("change", e => {
      state.tenant = e.target.value;
      toast("Tenant switched. Branding, data, and branch context changed.");
      render();
    });
    document.getElementById("globalSearch").addEventListener("input", e => {
      state.search = e.target.value;
      if (state.view !== "dashboard") render();
    });
    document.getElementById("quickAddBtn").addEventListener("click", openModal);
    document.getElementById("closeModal").addEventListener("click", () => document.getElementById("modal").classList.remove("show"));
    document.getElementById("exportBtn").addEventListener("click", () => {
      const rows = state.view === "dashboard" ? getRecords("students") : getRecords(state.view);
      const blob = new Blob([JSON.stringify(rows, null, 2)], { type: "application/json" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = `${state.tenant}-${state.view}-report.json`;
      a.click();
      URL.revokeObjectURL(a.href);
      toast("Report exported successfully.");
    });
    document.getElementById("rolePill").addEventListener("click", () => {
      const roles = ["Super Admin", "School Admin", "Principal", "Teacher", "Accountant", "Parent"];
      const current = document.getElementById("rolePill").textContent;
      document.getElementById("rolePill").textContent = roles[(roles.indexOf(current) + 1) % roles.length] || roles[0];
      toast("Role context changed. Navigation remains audit-safe.");
    });

    render();
  </script>
</body>
</html>
